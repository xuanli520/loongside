<svg width="1280" height="780" viewBox="0 0 1280 780" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Loong positioning map</title>
  <desc id="desc">A positioning map showing Loong as a Rust-based, governed base for vertical agents.</desc>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#8DA1B7" />
    </marker>
  </defs>

  <rect width="1280" height="780" fill="#FCFDFE" />
  <rect x="16" y="16" width="1248" height="748" rx="24" fill="#FCFDFE" stroke="#DCE5EE" stroke-width="2" />

  <text x="60" y="74" fill="#122033" font-size="32" font-family="Arial, Helvetica, sans-serif" font-weight="700">Where Loong sits</text>
  <text x="60" y="106" fill="#5A7087" font-size="18" font-family="Arial, Helvetica, sans-serif">A Rust-based claw baseline moving toward governed vertical agents.</text>

  <rect x="60" y="126" width="1160" height="64" rx="16" fill="#F4F8FC" stroke="#E3EAF2" stroke-width="1.5" />
  <text x="84" y="154" fill="#2B4662" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700">How to read this map</text>
  <text x="84" y="180" fill="#5A7087" font-size="16" font-family="Arial, Helvetica, sans-serif">Further right means more domain shaping. Higher means stronger governance, audit, and clearer extension seams.</text>

  <line x1="280" y1="650" x2="280" y2="232" stroke="#A1B2C4" stroke-width="2.5" marker-end="url(#arrowhead)" />
  <line x1="280" y1="650" x2="1160" y2="650" stroke="#A1B2C4" stroke-width="2.5" marker-end="url(#arrowhead)" />

  <line x1="280" y1="440" x2="1160" y2="440" stroke="#E2E9F0" stroke-width="1.5" stroke-dasharray="6 8" />
  <line x1="720" y1="232" x2="720" y2="650" stroke="#E2E9F0" stroke-width="1.5" stroke-dasharray="6 8" />

  <text x="248" y="276" text-anchor="end" fill="#61778E" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    <tspan x="248" dy="0">More governed,</tspan>
    <tspan x="248" dy="19">auditable, extensible</tspan>
  </text>

  <text x="248" y="594" text-anchor="end" fill="#61778E" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    <tspan x="248" dy="0">More lightweight</tspan>
    <tspan x="248" dy="19">and minimal</tspan>
  </text>

  <text x="300" y="688" fill="#61778E" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700">More general assistant fit</text>
  <text x="1160" y="688" text-anchor="end" fill="#61778E" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700">More domain-shaped systems</text>

  <rect x="350" y="334" width="300" height="116" rx="18" fill="#E7F0FF" stroke="#93B5E2" stroke-width="1.5" />
  <text x="372" y="370" fill="#243E63" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Assistant-first claws</text>
  <text x="372" y="398" fill="#48617A" font-size="15" font-family="Arial, Helvetica, sans-serif">
    <tspan x="372" dy="0">personal productivity, ready-made</tspan>
    <tspan x="372" dy="20">flows, and direct user value</tspan>
  </text>

  <rect x="390" y="498" width="300" height="116" rx="18" fill="#E8F5EC" stroke="#A8D2B2" stroke-width="1.5" />
  <text x="412" y="534" fill="#224A36" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Lightweight claws</text>
  <text x="412" y="562" fill="#4D6858" font-size="15" font-family="Arial, Helvetica, sans-serif">
    <tspan x="412" dy="0">tiny runtime, quick startup, and</tspan>
    <tspan x="412" dy="20">deploy-anywhere efficiency</tspan>
  </text>

  <rect x="826" y="506" width="304" height="116" rx="18" fill="#FFF1E5" stroke="#EDC099" stroke-width="1.5" />
  <text x="848" y="542" fill="#5A351D" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Autonomy-first stacks</text>
  <text x="848" y="570" fill="#735238" font-size="15" font-family="Arial, Helvetica, sans-serif">
    <tspan x="848" dy="0">persistent workflows, broad</tspan>
    <tspan x="848" dy="20">orchestration, and long runs</tspan>
  </text>

  <rect x="820" y="238" width="328" height="178" rx="20" fill="#FFF7D8" stroke="#D8B54B" stroke-width="2" />
  <text x="846" y="286" fill="#402B00" font-size="21" font-family="Arial, Helvetica, sans-serif" font-weight="700">Loong</text>
  <text x="846" y="318" fill="#6C5720" font-size="16" font-family="Arial, Helvetica, sans-serif">
    <tspan x="846" dy="0">Rust-based, governed base</tspan>
    <tspan x="846" dy="24">Policy, audit, and explicit seams</tspan>
    <tspan x="846" dy="24">Runnable today for teams shaping</tspan>
    <tspan x="846" dy="24">deeper vertical agents over time</tspan>
  </text>

  <path d="M650 392 C 720 388, 770 364, 820 336" stroke="#9CB0C4" stroke-width="1.5" stroke-dasharray="5 6" fill="none" />
  <path d="M690 556 C 760 526, 796 474, 830 398" stroke="#9CB0C4" stroke-width="1.5" stroke-dasharray="5 6" fill="none" />
  <path d="M978 506 L 978 416" stroke="#9CB0C4" stroke-width="1.5" stroke-dasharray="5 6" />

  <text x="640" y="744" text-anchor="middle" fill="#7B8EA2" font-size="12" font-family="Arial, Helvetica, sans-serif">Archetypes are illustrative. The map communicates product direction and design intent, not benchmark rankings.</text>
</svg>
