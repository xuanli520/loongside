[package]
name = "loongclaw-daemon"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[features]
default = ["mvp"]
mvp = ["loongclaw-app/default", "memory-sqlite"]
channel-cli = ["loongclaw-app/channel-cli"]
channel-telegram = ["loongclaw-app/channel-telegram"]
channel-feishu = ["loongclaw-app/channel-feishu"]
provider-openai = ["loongclaw-app/provider-openai"]
provider-anthropic = ["loongclaw-app/provider-anthropic"]
provider-bedrock = ["loongclaw-app/provider-bedrock"]
provider-volcengine = ["loongclaw-app/provider-volcengine"]
config-toml = ["loongclaw-app/config-toml"]
memory-sqlite = ["loongclaw-app/memory-sqlite"]
tool-shell = ["loongclaw-app/tool-shell"]
tool-file = ["loongclaw-app/tool-file"]
tool-webfetch = ["loongclaw-app/tool-webfetch"]
tool-browser = ["loongclaw-app/tool-browser"]

[dependencies]
clap.workspace = true
kernel = { package = "loongclaw-kernel", path = "../kernel" }
loongclaw-bench = { path = "../bench" }
loongclaw-app = { path = "../app", default-features = false }
loongclaw-spec = { path = "../spec" }
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
time.workspace = true
toml.workspace = true
chrono.workspace = true
base64.workspace = true
rand.workspace = true
sha2.workspace = true

[[bin]]
name = "loongclaw"
path = "src/main.rs"

[dev-dependencies]
axum.workspace = true
ed25519-dalek.workspace = true
loongclaw-spec = { path = "../spec", features = ["test-hooks"] }
sha2.workspace = true
wat = "1"

[lints]
workspace = true
