# cargo-deny configuration (v2 schema)
# Derived from: loongclaw-research/11-code-quality/synthesis/loongclaw-code-quality-strategy-v2.md

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]

[advisories]
ignore = ["RUSTSEC-2025-0057"]  # fxhash unmaintained — transitive dep of scraper 0.24, no security impact

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
highlight = "all"
wildcards = "allow"
deny = [
    { crate = "openssl", reason = "use rustls for pure-Rust TLS" },
    { crate = "openssl-sys", reason = "use rustls for pure-Rust TLS" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
