name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (required for manual runs, for example v0.1.0)"
        required: true

env:
  BIN_NAME: loongclaw
  PACKAGE_NAME: loongclaw

jobs:
  verify-release:
    name: Verify release gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26
        with:
          components: rustfmt, clippy

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@c676846f29d98ff6b0106d3608c7ffd4048af17b

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy check
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test (workspace)
        run: cargo test --workspace --locked

      - name: Test (all features)
        run: cargo test --workspace --all-features --locked

      - name: Docs build
        run: cargo doc --workspace --no-deps

      - name: Dependency graph contract
        run: ./scripts/check_dep_graph.sh

      - name: Strict architecture contract
        run: LOONGCLAW_ARCH_STRICT=true ./scripts/check_architecture_boundaries.sh

  build-binaries:
    name: Build ${{ matrix.target }} on ${{ matrix.os }}
    needs: verify-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            archive: zip
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@c676846f29d98ff6b0106d3608c7ffd4048af17b

      - name: Build release binary
        run: cargo build --release --locked -p loongclaw-daemon --bin ${{ env.BIN_NAME }} --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          archive="${PACKAGE_NAME}-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${archive}" "${BIN_NAME}${{ matrix.ext }}"

      - name: Package archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $archive = "${env:PACKAGE_NAME}-${env:RELEASE_TAG}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/${env:BIN_NAME}${{ matrix.ext }}" -DestinationPath "dist/$archive" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: dist/*
