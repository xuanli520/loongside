name: CI

on:
  pull_request:
    branches:
      - dev
      - main
      - release
      - 'release/**'
  push:
    branches:
      - dev
      - main
      - release
      - 'release/**'
  merge_group:
    types:
      - checks_requested

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BIN_NAME: loong
  ANDROID_NDK_VERSION: "27.3.13750724"
  ANDROID_NDK_REVISION: "r27d"
  ANDROID_NDK_LINUX_SHA256: "601246087a682d1944e1e16dd85bc6e49560fe8b6d61255be2829178c8ed15d9"
  ANDROID_API_LEVEL: "24"
  MINTLIFY_NODE_VERSION: "20.20.2"
  MINTLIFY_VERSION: "4.2.464"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_rust_jobs: ${{ steps.classify.outputs.run_rust_jobs }}
      run_docs_site: ${{ steps.classify.outputs.run_docs_site }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Classify changed files
        id: classify
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const modulePath = `${process.env.GITHUB_WORKSPACE}/scripts/workflow_change_router.mjs`;
            const moduleUrl = `file://${modulePath}`;
            const routerModule = await import(moduleUrl);
            const runtime = { core, github, context };
            const changedFileContext = await routerModule.collectChangedFileContext(runtime, {
              workflowLabel: "CI",
              forceRunEvents: ["merge_group"],
            });
            const routeOutputs = routerModule.classifyCiJobSet(changedFileContext);
            const touchedPathSummary = routerModule.describeTouchedPaths(routeOutputs);
            core.info(`CI changed paths: ${touchedPathSummary || "<full-validation>"}`);
            routerModule.writeRouteOutputs(core, routeOutputs);

  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Shell syntax checks
        run: |
          python3 -c "from pathlib import Path; compile(Path('scripts/sync_github_labels.py').read_text(), 'scripts/sync_github_labels.py', 'exec')"
          bash -n scripts/check_glibc_floor.sh
          bash -n scripts/install.sh
          bash -n scripts/publish_crates_io.sh
          bash -n scripts/architecture_budget_lib.sh
          bash -n scripts/check_architecture_boundaries.sh
          bash -n scripts/check_architecture_drift_freshness.sh
          bash -n scripts/check_public_repo_hygiene.sh
          bash -n scripts/generate_architecture_drift_report.sh
          bash -n scripts/test_architecture_budget_scripts.sh
          bash -n scripts/test_check_architecture_drift_freshness.sh
          bash -n scripts/test_generate_architecture_drift_report.sh
          bash -n scripts/test_check_glibc_floor.sh
          bash -n scripts/test_install_sh.sh
          bash -n scripts/test_publish_crates_io.sh
          bash -n scripts/release_artifact_lib.sh
          bash -n scripts/bootstrap_release_local_artifacts.sh
          bash -n scripts/test_release_artifact_lib.sh
          bash -n scripts/test_release_workflow_hardening.sh
          bash -n scripts/test_bootstrap_release_local_artifacts.sh
          bash -n scripts/test_ci_workflow_change_routing.sh
          bash -n scripts/test_promotion_guard_workflows.sh
          bash -n scripts/test_workflow_change_router.sh
          bash -n scripts/check-docs.sh
          bash -n scripts/check_dep_graph.sh
          bash -n scripts/stress_daemon_tests.sh
          bash -n scripts/test_scan_workflow_hardening.sh
          bash -n scripts/test_sync_github_labels.sh
          bash -n scripts/test_stress_daemon_tests.sh
          node --check scripts/workflow_change_router.mjs
          node --check scripts/test_workflow_change_router.mjs

      - name: Governance regression tests
        run: |
          python3 scripts/sync_github_labels.py --check
          bash scripts/test_architecture_budget_scripts.sh
          bash scripts/test_check_architecture_drift_freshness.sh
          bash scripts/test_generate_architecture_drift_report.sh
          bash scripts/test_check_glibc_floor.sh
          bash scripts/test_install_sh.sh
          bash scripts/test_publish_crates_io.sh
          bash scripts/test_release_artifact_lib.sh
          bash scripts/test_release_workflow_hardening.sh
          bash scripts/test_bootstrap_release_local_artifacts.sh
          bash scripts/check_public_repo_hygiene.sh
          bash scripts/test_ci_workflow_change_routing.sh
          bash scripts/test_promotion_guard_workflows.sh
          bash scripts/test_workflow_change_router.sh
          bash scripts/test_scan_workflow_hardening.sh
          bash scripts/test_sync_github_labels.sh
          bash scripts/test_stress_daemon_tests.sh

      - name: Fresh architecture drift report
        run: bash scripts/check_architecture_drift_freshness.sh docs/releases/support/architecture-drift-$(date -u +%Y-%m).md

      - name: Bootstrap local release artifacts
        run: scripts/bootstrap_release_local_artifacts.sh

      - name: Strict docs governance
        run: LOONG_RELEASE_DOCS_STRICT=1 scripts/check-docs.sh

      - name: Dependency graph contract
        run: ./scripts/check_dep_graph.sh

      - name: Strict architecture contract
        run: LOONG_ARCH_STRICT=true ./scripts/check_architecture_boundaries.sh

      - name: Diff hygiene
        run: git diff --check

  docs-site:
    needs: changes
    if: ${{ needs.changes.outputs.run_docs_site == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ env.MINTLIFY_NODE_VERSION }}

      - name: Mintlify broken links
        run: npm exec --yes --package=mintlify@${{ env.MINTLIFY_VERSION }} -- mintlify broken-links

      - name: Mintlify export
        shell: bash
        run: |
          set -euo pipefail
          rm -f /tmp/loong-docs-export.zip
          set +e
          timeout 300s npm exec --yes --package=mintlify@${{ env.MINTLIFY_VERSION }} -- mintlify export --output /tmp/loong-docs-export.zip
          export_status=$?
          set -e
          if [ "$export_status" -eq 0 ]; then
            exit 0
          fi
          if [ "$export_status" -eq 124 ] && [ -f /tmp/loong-docs-export.zip ]; then
            echo "Mintlify export produced the artifact before timing out; treating CLI hang as non-fatal."
            exit 0
          fi
          exit "$export_status"

      - name: Assert export artifact exists
        run: test -f /tmp/loong-docs-export.zip

  rust-quality:
    needs: changes
    if: ${{ needs.changes.outputs.run_rust_jobs == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26
        with:
          components: rustfmt, clippy

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy check
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  rust-test-default:
    needs: changes
    if: ${{ needs.changes.outputs.run_rust_jobs == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Test
        run: cargo test --workspace --locked

  rust-check-browser-without-webfetch:
    needs: changes
    if: ${{ needs.changes.outputs.run_rust_jobs == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Check browser feature set without web.fetch
        run: >
          cargo check -p loong-app --no-default-features
          --features
          channel-cli,channel-telegram,channel-feishu,channel-matrix,config-toml,memory-sqlite,feishu-integration,tool-shell,tool-file,tool-browser,provider-openai,provider-anthropic,provider-bedrock,provider-volcengine

  rust-test-all-features:
    needs: changes
    if: ${{ needs.changes.outputs.run_rust_jobs == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Test (all features)
        run: cargo test --workspace --all-features --locked

  android-termux-build:
    needs: changes
    if: ${{ needs.changes.outputs.run_rust_jobs == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26
        with:
          targets: aarch64-linux-android

      - name: Ensure active toolchain target
        run: rustup target add aarch64-linux-android

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail
          ndk_zip="android-ndk-${{ env.ANDROID_NDK_REVISION }}-linux.zip"
          ndk_dir="android-ndk-${{ env.ANDROID_NDK_REVISION }}"
          curl -fSL "https://dl.google.com/android/repository/${ndk_zip}" -o "${ndk_zip}"
          echo "${{ env.ANDROID_NDK_LINUX_SHA256 }}  ${ndk_zip}" | shasum -a 256 --check -
          unzip -q "${ndk_zip}"
          [ -d "${ndk_dir}" ] || (echo "Missing extracted NDK directory: ${ndk_dir}" && exit 1)
          rm -f "${ndk_zip}"
          {
            echo "ANDROID_NDK_HOME=${PWD}/${ndk_dir}"
            echo "ANDROID_NDK_ROOT=${PWD}/${ndk_dir}"
            echo "ANDROID_NDK_LATEST_HOME=${PWD}/${ndk_dir}"
          } >> "$GITHUB_ENV"

      - name: Build release binary (Android/Termux)
        shell: bash
        env:
          LOONG_RELEASE_BUILD: "1"
        run: |
          set -euo pipefail
          toolchain="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CC_aarch64_linux_android="${toolchain}/aarch64-linux-android${ANDROID_API_LEVEL}-clang"
          export CXX_aarch64_linux_android="${toolchain}/aarch64-linux-android${ANDROID_API_LEVEL}-clang++"
          export AR_aarch64_linux_android="${toolchain}/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${toolchain}/aarch64-linux-android${ANDROID_API_LEVEL}-clang"
          cargo build --release --locked -p loong --bin "${BIN_NAME}" --target aarch64-linux-android

  docs-build:
    needs: changes
    if: ${{ needs.changes.outputs.run_rust_jobs == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Docs build
        run: cargo doc --workspace --no-deps

  build:
    name: build
    if: ${{ always() }}
    needs:
      - changes
      - governance
      - rust-quality
      - rust-test-default
      - rust-check-browser-without-webfetch
      - rust-test-all-features
      - android-termux-build
      - docs-build
      - docs-site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require successful upstream jobs
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          GOVERNANCE_RESULT: ${{ needs.governance.result }}
          RUST_QUALITY_RESULT: ${{ needs.rust-quality.result }}
          RUST_TEST_DEFAULT_RESULT: ${{ needs.rust-test-default.result }}
          RUST_CHECK_BROWSER_WITHOUT_WEBFETCH_RESULT: ${{ needs.rust-check-browser-without-webfetch.result }}
          RUST_TEST_ALL_FEATURES_RESULT: ${{ needs.rust-test-all-features.result }}
          ANDROID_TERMUX_BUILD_RESULT: ${{ needs.android-termux-build.result }}
          DOCS_BUILD_RESULT: ${{ needs.docs-build.result }}
          DOCS_SITE_RESULT: ${{ needs.docs-site.result }}
        run: |
          set -euo pipefail

          check_result() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              echo "::error title=${name} result::Expected success, got ${result}"
              exit 1
            fi
          }

          check_optional_result() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "::error title=${name} result::Expected success or skipped, got ${result}"
              exit 1
            fi
          }

          check_result changes "$CHANGES_RESULT"
          check_result governance "$GOVERNANCE_RESULT"
          check_optional_result rust-quality "$RUST_QUALITY_RESULT"
          check_optional_result rust-test-default "$RUST_TEST_DEFAULT_RESULT"
          check_optional_result rust-check-browser-without-webfetch "$RUST_CHECK_BROWSER_WITHOUT_WEBFETCH_RESULT"
          check_optional_result rust-test-all-features "$RUST_TEST_ALL_FEATURES_RESULT"
          check_optional_result android-termux-build "$ANDROID_TERMUX_BUILD_RESULT"
          check_optional_result docs-build "$DOCS_BUILD_RESULT"
          check_optional_result docs-site "$DOCS_SITE_RESULT"
