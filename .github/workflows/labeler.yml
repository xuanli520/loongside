# Generated by scripts/sync_github_labels.py. Do not edit manually.

name: labeler

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited
  issues:
    types:
      - opened
      - edited
      - reopened
  workflow_dispatch:

concurrency:
  group: labeler-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  sync-managed-labels:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Ensure managed labels exist
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
