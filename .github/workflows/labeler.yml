                    "color": "d93f0b",
                    "description": "Very large pull request: more than 1000 changed lines."
                  }
                ];
            const legacyLabels = [
                  {
                    "name": "area: kernel",
                    "replacement": "kernel"
                  },
                  {
                    "name": "area: contracts",
                    "replacement": "contracts"
                  },
                  {
                    "name": "area: protocol",
                    "replacement": "protocol"
                  },
                  {
                    "name": "area: spec",
                    "replacement": "spec"
                  },
                  {
                    "name": "area: daemon",
                    "replacement": "daemon"
                  },
                  {
                    "name": "area: providers",
                    "replacement": "providers"
                  },
                  {
                    "name": "area: tools",
                    "replacement": "tools"
                  },
                  {
                    "name": "area: browser",
                    "replacement": "browser"
                  },
                  {
                    "name": "area: channels",
                    "replacement": "channels"
                  },
                  {
                    "name": "area: memory",
                    "replacement": "memory"
                  },
                  {
                    "name": "area: conversation",
                    "replacement": "conversation"
                  },
                  {
                    "name": "area: config",
                    "replacement": "config"
                  },
                  {
                    "name": "area: acp",
                    "replacement": "acp"
                  },
                  {
                    "name": "area: migration",
                    "replacement": "migration"
                  },
                  {
                    "name": "area: docs",
                    "replacement": "docs"
                  },
                  {
                    "name": "area: ci",
                    "replacement": "ci"
                  },
                  {
                    "name": "domain:core-runtime",
                    "replacement": "core-runtime"
                  },
                  {
                    "name": "domain:agent-experience",
                    "replacement": "agent-experience"
                  },
                  {
                    "name": "domain:tools-plugins",
                    "replacement": "tools-plugins"
                  },
                  {
                    "name": "domain:channels-protocol",
                    "replacement": "channels-protocol"
                  },
                  {
                    "name": "domain:platform-dx",
                    "replacement": "platform-dx"
                  },
                  {
                    "name": "rust",
                    "replacement": null
                  }
                ];

            async function getLabelOrNull(name) {
              try {
                const { data } = await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name
                });
                return data;
              } catch (error) {
                if (error.status === 404) {
                  return null;
                }
                throw error;
              }
            }

            for (const legacy of legacyLabels) {
              const legacyLabel = await getLabelOrNull(legacy.name);
              if (!legacyLabel) {
                continue;
              }

              if (!legacy.replacement) {
                await github.rest.issues.deleteLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: legacy.name
                });
                core.info(`Deleted legacy label ${legacy.name}`);
                continue;
              }

              const replacement = managedLabels.find((label) => label.name === legacy.replacement);
              if (!replacement) {
                throw new Error(`Missing managed replacement for legacy label ${legacy.name}`);
              }

              const replacementLabel = await getLabelOrNull(replacement.name);
              if (!replacementLabel) {
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: legacy.name,
                  new_name: replacement.name,
                  color: replacement.color,
                  description: replacement.description
                });
                core.info(`Renamed legacy label ${legacy.name} to ${replacement.name}`);
                continue;
              }

              let page = 1;
              while (true) {
                const { data: issues } = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: "all",
                  labels: legacy.name,
                  per_page: 100,
                  page
                });

                if (issues.length === 0) {
                  break;
                }

                for (const issue of issues) {
                  const labelNames = issue.labels
                    .map((label) => typeof label === "string" ? label : label.name)
                    .filter(Boolean);
                  const mergedLabels = labelNames.filter((name) => name !== legacy.name);
                  if (!mergedLabels.includes(replacement.name)) {
                    mergedLabels.push(replacement.name);
                  }

                  await github.rest.issues.setLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    labels: mergedLabels
                  });
                }

                if (issues.length < 100) {
                  break;
                }

                page += 1;
              }

              await github.rest.issues.deleteLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: legacy.name
              });
              core.info(`Migrated legacy label ${legacy.name} to ${replacement.name}`);
            }

            for (const label of managedLabels) {
              try {
                const { data: current } = await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });

                const currentDescription = current.description || "";
                if (
                  current.color.toLowerCase() !== label.color.toLowerCase() ||
                  currentDescription !== label.description
                ) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    new_name: label.name,
                    color: label.color,
                    description: label.description
                  });
                  core.info(`Updated label ${label.name}`);
                }
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                core.info(`Created label ${label.name}`);
              }
            }

            core.notice(`Managed ${managedLabels.length} labels.`);

  label-pull-request:
    if: ${{ github.event_name == 'pull_request_target' }}
    needs: sync-managed-labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout base repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Apply path labels
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

      - name: Apply size label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const issueNumber = context.payload.pull_request.number;
            const sizeLabels = ["size: XS", "size: S", "size: M", "size: L", "size: XL"];
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issueNumber,
              per_page: 100
            });

            const changedLines = files.reduce((total, file) => total + file.additions + file.deletions, 0);

            let sizeLabel = "size: XL";
            if (changedLines <= 50) {
              sizeLabel = "size: XS";
            } else if (changedLines <= 200) {
              sizeLabel = "size: S";
            } else if (changedLines <= 500) {
              sizeLabel = "size: M";
            } else if (changedLines <= 1000) {
              sizeLabel = "size: L";
            }

            const { data: existingLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            const mergedLabels = [
              ...existingLabels
                .map((label) => label.name)
                .filter((name) => !sizeLabels.includes(name)),
              sizeLabel
            ];

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: mergedLabels
            });

            core.notice(`Applied ${sizeLabel} from ${changedLines} changed lines.`);

  label-issue-surface:
    if: ${{ github.event_name == 'issues' }}
    needs: sync-managed-labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Sync issue surface label from form
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const issue = context.payload.issue;
            const surfaceLabelMap = {
                  "Kernel / policy / approvals": "kernel",
                  "Contracts": "contracts",
                  "Protocol": "protocol",
                  "Spec / architecture boundaries": "spec",
                  "Daemon / CLI / install": "daemon",
                  "Providers / routing": "providers",
                  "Tools": "tools",
                  "Browser automation": "browser",
                  "Channels / integrations": "channels",
                  "Memory / context assembly": "memory",
                  "Conversation / session runtime": "conversation",
                  "Config": "config",
                  "ACP control plane": "acp",
                  "Migration / onboarding": "migration",
                  "Docs / contributor workflow": "docs",
                  "CI / release / workflows": "ci",
                  "Unknown / needs triage": null
                };

            const managedSurfaceLabels = Object.values(surfaceLabelMap).filter(Boolean);
            const body = (issue.body || "").replace(/\r\n/g, "\n");
            const match = body.match(/^### Surface\s*\n+([^\n]+)/m);
            const selectedSurface = match ? match[1].trim() : null;
            const nextSurfaceLabel = selectedSurface ? surfaceLabelMap[selectedSurface] : null;

            const { data: existingLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number
            });

            const mergedLabels = existingLabels
              .map((label) => label.name)
              .filter((name) => !managedSurfaceLabels.includes(name));

            if (nextSurfaceLabel) {
              mergedLabels.push(nextSurfaceLabel);
            }

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: mergedLabels
            });

            if (selectedSurface) {
              core.notice(`Resolved issue surface "${selectedSurface}" to ${nextSurfaceLabel ?? "no managed surface label"}.`);
            } else {
              core.notice("No Surface section found in issue body; left managed surface labels cleared.");
            }
