name: Security

on:
  pull_request:
    branches:
      - dev
      - main
      - release
      - 'release/**'
  push:
    branches:
      - dev
      - main
      - release
      - 'release/**'
  schedule:
    - cron: "0 4 * * 1"

jobs:
  advisory-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26

      - name: Install security tools
        uses: taiki-e/install-action@0d865d5cc6d507df4765f1f866bfae8bab4e2a73
        with:
          tool: cargo-audit,cargo-deny

      - name: Cargo audit
        run: cargo audit

      - name: Cargo deny
        run: cargo deny check advisories bans sources
