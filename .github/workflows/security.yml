name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * 1"

jobs:
  advisory-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26

      - name: Install security tools
        uses: taiki-e/install-action@94a7388bec5d4c8dd93e3ebf09e0ff448f3f6f4d
        with:
          tool: cargo-audit,cargo-deny

      - name: Cargo audit
        run: cargo audit

      - name: Cargo deny
        run: cargo deny check advisories bans sources
